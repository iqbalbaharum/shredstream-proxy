syntax = "proto3";

package shredstream;

import "google/protobuf/timestamp.proto";
// import "shared.proto";

option go_package = "github.com/iqbalbaharum/solana-protos/pb";

message ShredstreamSocket {
  string ip = 1;
  int64 port = 2;
}

message ShredstreamHeartbeat {
  // don't trust IP:PORT from tcp header since it can be tampered over the wire
  // `socket.ip` must match incoming packet's ip. this prevents spamming an unwitting destination
  ShredstreamSocket socket = 1;

  // regions for shredstream proxy to receive shreds from
  // list of valid regions: https://docs.jito.wtf/lowlatencytxnsend/#api
  repeated string regions = 2;
}

message ShredstreamHeartbeatResponse {
  // client must respond within `ttl_ms` to keep stream alive
  uint32 ttl_ms = 1;
}

service Shredstream {
  // RPC endpoint to send heartbeats to keep shreds flowing
  rpc SendHeartbeat(ShredstreamHeartbeat) returns (ShredstreamHeartbeatResponse) {}
}

message TraceShred {
  // source region, one of: https://docs.jito.wtf/lowlatencytxnsend/#api
  string region = 1;
  // timestamp of creation
  google.protobuf.Timestamp created_at = 2;
  // monotonically increases, resets upon service restart
  uint32 seq_num = 3;
}

// Shredstream Proxy

service ShredstreamProxy {
  rpc SubscribeEntries(SubscribeEntriesRequest) returns (stream Entry);
  rpc SubscribeParsedTransactions(SubscribeParsedRequest) returns (stream ParsedTransaction);
}

message SubscribeEntriesRequest {
  bool smart_filter = 1;
}

message SubscribeParsedRequest {
  string filter = 1;  // "all", "pumpfun", "axiom"
}

enum TradeType {
  TRADE_TYPE_UNKNOWN = 0;
  TRADE_TYPE_PUMPFUN_BUY = 1;
  TRADE_TYPE_PUMPFUN_SELL = 2;
  TRADE_TYPE_PUMPFUN_BUY_EXACT_IN = 3;
  TRADE_TYPE_AXIOM_BUY = 4;
  TRADE_TYPE_AXIOM_SELL = 5;
}

enum Origin {
  ORIGIN_UNSPECIFIED = 0;
  ORIGIN_PUMPFUN = 1;
  ORIGIN_AXIOM = 2;
}

message ParsedTransaction {
  uint64 slot = 1;
  bytes signature = 2;
  string mint = 3;
  string signer = 4;
  TradeType trade_type = 5;
  Origin origin = 6;
  uint64 token_amount = 7;
  uint64 sol_amount = 8;
  uint64 timestamp = 9;
}

message Entry {
  // the slot that the entry is from
  uint64 slot = 1;

  // Serialized bytes of Vec<Entry>: https://docs.rs/solana-entry/latest/solana_entry/entry/struct.Entry.html
  bytes entries = 2;
}
